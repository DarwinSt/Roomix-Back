spring.application.name=roomix
server.port=8080

# Sobrescribe credenciales sin tocar este archivo: copia application-local.properties.example
spring.config.import=optional:classpath:application-local.properties

# PostgreSQL — valores por defecto (ajústalos en application-local.properties)
spring.datasource.url=jdbc:postgresql://localhost:5432/roomix
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=false
